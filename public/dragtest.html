<!DOCTYPE html>
<html>
<head>
  <title>Drag Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; height: 100vh; overflow: hidden; font-family: monospace; }
    #log { position: fixed; bottom: 10px; left: 10px; color: #0f0; font-size: 11px; z-index: 9999; }
  </style>
</head>
<body>
  <div id="log">waiting...</div>

  <div id="box" style="
    position: absolute; left: 100px; top: 100px; width: 300px; height: 200px;
    background: #333; border: 2px solid #666; border-radius: 8px; cursor: grab;
    display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px;
    user-select: none;
  ">
    DRAG ME
  </div>

  <script>
    const box = document.getElementById('box')
    const log = document.getElementById('log')
    let x = 100, y = 100

    box.addEventListener('pointerdown', e => {
      e.preventDefault()
      log.textContent = 'pointerdown fired at ' + e.clientX + ',' + e.clientY
      box.style.cursor = 'grabbing'
      box.style.borderColor = '#0f0'
      
      const startMx = e.clientX
      const startMy = e.clientY
      const startX = x
      const startY = y

      const onMove = ev => {
        ev.preventDefault()
        x = startX + (ev.clientX - startMx)
        y = startY + (ev.clientY - startMy)
        box.style.left = x + 'px'
        box.style.top = y + 'px'
        log.textContent = 'moving: ' + Math.round(x) + ',' + Math.round(y)
      }

      const onUp = () => {
        box.style.cursor = 'grab'
        box.style.borderColor = '#666'
        log.textContent = 'dropped at ' + Math.round(x) + ',' + Math.round(y)
        window.removeEventListener('pointermove', onMove)
        window.removeEventListener('pointerup', onUp)
      }

      window.addEventListener('pointermove', onMove)
      window.addEventListener('pointerup', onUp)
    })
  </script>
</body>
</html>
